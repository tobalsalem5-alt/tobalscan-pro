<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - TobalScan Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            padding: 20px;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }
        .stat-value { font-size: 32px; font-weight: 700; color: var(--primary); }
        .stat-label { opacity: 0.7; font-size: 14px; }
        .table-container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
            margin-top: 20px;
        }
        table { width: 100%; border-collapse: collapse; text-align: right; }
        th, td { padding: 15px; border-bottom: 1px solid var(--glass-border); }
        th { background: rgba(255, 255, 255, 0.05); font-weight: 700; }
        tr:hover { background: rgba(255, 255, 255, 0.02); }
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            background: var(--primary);
        }
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: 0.3s;
        }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--bg);
            border: 1px solid var(--primary);
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; opacity: 0.8; }
        .form-group input {
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>لوحة التحكم</h1>
        <div>
            <button id="manageAgentsBtn" class="btn" onclick="openAgentsModal()" style="display: none; margin-left: 10px;">إدارة الوكلاء</button>
            <button class="btn" style="background: #ef4444;" onclick="logout()">تسجيل الخروج</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="totalScans">0</div>
            <div class="stat-label">إجمالي المسوحات</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="activeAgents">0</div>
            <div class="stat-label">الوكلاء النشطون</div>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>الوقت</th>
                    <th>الوكيل</th>
                    <th>كود الكرت</th>
                    <th>الحالة</th>
                </tr>
            </thead>
            <tbody id="scansTable"></tbody>
        </table>
    </div>

    <div id="agentsModal" class="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0;">إدارة الوكلاء</h2>
                <button class="btn" style="background: #ef4444;" onclick="closeAgentsModal()">إغلاق</button>
            </div>
            <form id="addAgentForm" style="margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--glass-border);">
                <div class="form-group">
                    <label>اسم المستخدم للوكيل</label>
                    <input type="text" id="agentUsername" required>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="agentPassword" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">إضافة وكيل جديد</button>
            </form>
            <div class="table-container" style="max-height: 300px; overflow-y: auto;">
                <table id="agentsTable">
                    <thead>
                        <tr>
                            <th>الوكيل</th>
                            <th>الإجراء</th>
                        </tr>
                    </thead>
                    <tbody id="agentsList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        
        if (!token) window.location.href = 'login.html';
        if (user.role === 'admin' || user.username === 'admin') {
            document.getElementById('manageAgentsBtn').style.display = 'inline-block';
        }

        const socket = io();

        async function loadScans() {
            try {
                const res = await fetch('/api/scans', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const scans = await res.json();
                updateTable(scans);
                updateStats(scans);
            } catch (err) { console.error(err); }
        }

        function updateTable(scans) {
            const tbody = document.getElementById('scansTable');
            tbody.innerHTML = scans.map(scan => '<tr><td>' + new Date(scan.createdAt).toLocaleString('ar-EG') + '</td><td>' + (scan.agent ? scan.agent.username : 'غير معروف') + '</td><td>' + scan.voucherCode + '</td><td><span class="badge">' + scan.status + '</span></td></tr>').join('');
        }

        function updateStats(scans) {
            document.getElementById('totalScans').textContent = scans.length;
            const uniqueAgents = new Set(scans.map(s => s.agent ? s.agent._id : null)).size;
            document.getElementById('activeAgents').textContent = uniqueAgents;
        }

        socket.on('newScan', () => loadScans());

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        function openAgentsModal() {
            document.getElementById('agentsModal').style.display = 'block';
            loadAgents();
        }

        function closeAgentsModal() {
            document.getElementById('agentsModal').style.display = 'none';
        }

        async function loadAgents() {
            try {
                const res = await fetch('/api/users', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const agents = await res.json();
                document.getElementById('agentsList').innerHTML = agents.map(agent => '<tr><td>' + agent.username + '</td><td><span class="badge" style="background: #ef4444; cursor: pointer;" onclick="deleteAgent(\'' + agent._id + '\')">حذف</span></td></tr>').join('');
            } catch (err) { console.error(err); }
        }

        document.getElementById('addAgentForm').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('agentUsername').value;
            const password = document.getElementById('agentPassword').value;
            try {
                const res = await fetch('/api/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ username, password, role: 'agent' })
                });
                if (res.ok) {
                    document.getElementById('addAgentForm').reset();
                    loadAgents();
                } else {
                    alert('خطأ في الإضافة');
                }
            } catch (err) { alert('خطأ في الاتصال'); }
        };

        async function deleteAgent(id) {
            if (!confirm('هل أنت متأكد؟')) return;
            try {
                const res = await fetch('/api/users/' + id, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.ok) loadAgents();
            } catch (err) { alert('خطأ في الحذف'); }
        }

        loadScans();
    </script>
</body>
</html>
