<!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>TobalScan Pro</title>
      <link rel="stylesheet" href="style.css">
  </head>
  <body>
      <div class="container">
          <header>
              <h1>TobalScan Pro</h1>
              <p>Advanced Scanner Interface</p>
        </header>


        <main>
            <div id="reader"></div>
            <div id="result">

                  <button id="start-btn">Start Scanner</button>
                  <button id="stop-btn">Stop Scanner</button>
              </div>
          </main>


          <footer>
              <p>&copy; 2026 TobalScan Pro</p>
          </footer>
      </div>
      <audio id="error-sound" src="https://www.soundjay.com/buttons/beep-05.mp3" preload="auto"></audio>
    <script src="app.js"></script>
  </body>
